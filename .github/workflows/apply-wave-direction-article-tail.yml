name: apply-wave-direction-article-tail

on:
  pull_request:
    types: [opened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/article-wave-direction-math'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
      - run: python3 tools/replace_wave_direction_article_tail.py
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add doc/kalman_ou_iii/w3d-fus-methods.tex-part
          git commit -m "Replace obsolete wave direction article section"
          git push origin HEAD:${GITHUB_HEAD_REF}
