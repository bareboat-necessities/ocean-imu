name: apply-wave-direction-article-tail

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/article-wave-direction-math'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
      - run: python3 tools/replace_wave_direction_article_tail.py
      - name: Commit replaced fragment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          path=doc/kalman_ou_iii/w3d-fus-methods.tex-part
          sha=$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=${GITHUB_HEAD_REF}" --jq .sha)
          content=$(base64 -w0 "${path}")
          gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" \
            -f message='Replace obsolete wave direction article section' \
            -f content="${content}" -f sha="${sha}" -f branch="${GITHUB_HEAD_REF}"
