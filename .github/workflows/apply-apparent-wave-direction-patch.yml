name: apply-apparent-wave-direction-patch

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' && github.head_ref == 'agent/apparent-wave-propagation-direction' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v6
        with:
          ref: agent/apparent-wave-propagation-direction
          fetch-depth: 0

      - name: Normalize exact patch guards
        run: |
          python3 - <<'PY'
          from pathlib import Path

          source_paths = [
              Path('src/kalman_ou_ii/SeaStateFusionFilter_OU_II.h'),
              Path('src/kalman_ou_iii/SeaStateFusionFilter_OU_III.h'),
          ]
          for path in source_paths:
              text = path.read_text()
              text = text.replace('        dir_filter_      = KalmanWaveDirection',
                                  '        dir_filter_ = KalmanWaveDirection')
              text = text.replace('        dir_sign_state_  = UNCERTAIN;',
                                  '        dir_sign_state_ = UNCERTAIN;')
              path.write_text(text)

          patch = Path('tools/apply_apparent_wave_direction_patch.py')
          text = patch.read_text()
          text = text.replace('        dir_filter_      = KalmanWaveDirection',
                              '        dir_filter_ = KalmanWaveDirection')
          text = text.replace('        dir_sign_state_  = UNCERTAIN;',
                              '        dir_sign_state_ = UNCERTAIN;')

          old_guard = '''def replace_once(path: str, old: str, new: str) -> None:\n    p = ROOT / path\n    text = p.read_text(encoding="utf-8")\n    count = text.count(old)\n    if count != 1:\n        raise RuntimeError(f"{path}: expected one occurrence, found {count}: {old[:100]!r}")\n    p.write_text(text.replace(old, new, 1), encoding="utf-8")\n'''
          new_guard = '''def replace_once(path: str, old: str, new: str) -> None:\n    p = ROOT / path\n    text = p.read_text(encoding="utf-8")\n    count = text.count(old)\n    allowed = {1, 2} if path == "src/util/W3dSimCommon.cpp" else {1}\n    if count not in allowed:\n        raise RuntimeError(f"{path}: expected {sorted(allowed)}, found {count}: {old[:100]!r}")\n    p.write_text(text.replace(old, new, count), encoding="utf-8")\n'''
          if text.count(old_guard) != 1:
              raise RuntimeError('patch guard source did not match exactly')
          patch.write_text(text.replace(old_guard, new_guard, 1))
          PY

      - name: Apply code and test changes
        id: patch
        shell: bash
        run: |
          set +e
          python3 tools/apply_apparent_wave_direction_patch.py > /tmp/patch-output.log 2>&1
          status=$?
          cat /tmp/patch-output.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit diagnostic when patch fails
        if: steps.patch.outputs.status != '0'
        shell: bash
        run: |
          cp /tmp/patch-output.log tools/apparent-wave-direction-patch-error.log
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tools/apparent-wave-direction-patch-error.log
          git commit -m "Record direction patch failure [skip ci]"
          git push origin HEAD:agent/apparent-wave-propagation-direction
          exit 1

      - name: Keep workflow files out of generated source commit
        if: steps.patch.outputs.status == '0'
        run: |
          git checkout HEAD -- .github/workflows/build.yml
          rm -f tools/apply_apparent_wave_direction_patch.py
          rm -f tools/apparent-wave-direction-patch-error.log

      - name: Commit patched source tree
        if: steps.patch.outputs.status == '0'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git reset .github/workflows/apply-apparent-wave-direction-patch.yml
          git commit -m "Correct apparent wave propagation direction [skip ci]"
          git push origin HEAD:agent/apparent-wave-propagation-direction
