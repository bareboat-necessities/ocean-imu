name: PR2 OU-III diagnostic

on:
  push:
    branches: [agent/pr2-ou3-diagnostic]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v6
        with:
          ref: d4ba82002fe389e92a9df0a7878a0e7f0eb1c72f

      - name: Run unchanged OU-III gate and publish exact failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release download v1.1.3 \
            --repo bareboat-necessities/oceanography-waves-lib \
            --pattern 'sim-data-files.zip' \
            --clobber >/dev/null
          unzip -oq sim-data-files.zip -d "${{ github.workspace }}/plots/kalman_ou_iii"
          sudo apt-get update -qq >/dev/null
          sudo apt-get install -y -qq g++ make libeigen3-dev >/dev/null
          cd tests/kalman_ou_iii
          make build >/tmp/ou3-build.log 2>&1
          cp "${{ github.workspace }}"/plots/kalman_ou_iii/*.csv .
          set +e
          bash ./run_tests.sh >/tmp/ou3-test.log 2>&1
          status=$?
          set -e
          {
            echo '### Exact OU-III diagnostic on PR head `d4ba82002fe389e92a9df0a7878a0e7f0eb1c72f`'
            echo
            echo 'The repository files, test launcher, simulation data release, and thresholds were not modified.'
            echo
            echo "Exit code: \`$status\`"
            echo
            echo '```text'
            tail -n 220 /tmp/ou3-test.log
            echo '```'
          } >/tmp/ou3-comment.md
          gh pr comment 188 --repo bareboat-necessities/ocean-imu --body-file /tmp/ou3-comment.md
          exit "$status"
