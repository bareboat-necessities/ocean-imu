name: OU-III covariance-sync diagnostic

on:
  push:
    branches: [agent/pr2-ou3-diagnostic]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v6
        with:
          ref: d4ba82002fe389e92a9df0a7878a0e7f0eb1c72f

      - name: Apply OU-III posterior-marginal synchronization
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          core = Path('src/kalman_ou_iii/Kalman3D_Wave_OU_III.h')
          text = core.read_text()
          old = '''    void reset_aw_covariance_to_stationary() {
              for (int i = 0; i < NX; ++i) {
                  if (i < OFF_AW || i >= OFF_AW + 3) {
                      Pext.template block<3,1>(OFF_AW, i).setZero();
                      Pext.template block<1,3>(i, OFF_AW).setZero();
                  }
              }
              Pext.template block<3,3>(OFF_AW, OFF_AW) = Sigma_aw_stat;
              symmetrize_Pext_();
          }
'''
          new = old + '''
    // Synchronize only the a_w marginal with the stationary process model while
    // preserving cross-covariances learned by the running filter.
    void synchronize_aw_covariance_to_stationary() {
        Pext.template block<3,3>(OFF_AW, OFF_AW) = Sigma_aw_stat;
        symmetrize_Pext_();
    }
'''
          if text.count(old) != 1:
              raise RuntimeError('unexpected OU-III reset method')
          core.write_text(text.replace(old, new))

          wrapper = Path('src/kalman_ou_iii/SeaStateFusionFilter_OU_III.h')
          text = wrapper.read_text()
          old = '        mekf_->set_aw_stationary_std(Eigen::Vector3f(sH, sH, sZ));\n'
          new = '''        const Eigen::Vector3f aw_std(sH, sH, sZ);
        mekf_->set_aw_stationary_std(aw_std);
        mekf_->synchronize_aw_covariance_to_stationary();
'''
          if text.count(old) != 1:
              raise RuntimeError('unexpected OU-III tuning call')
          wrapper.write_text(text.replace(old, new))
          PY
          git diff --check
          git diff -- src/kalman_ou_iii/Kalman3D_Wave_OU_III.h src/kalman_ou_iii/SeaStateFusionFilter_OU_III.h

      - name: Run complete unchanged OU-III quality gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release download v1.1.3 \
            --repo bareboat-necessities/oceanography-waves-lib \
            --pattern 'sim-data-files.zip' \
            --clobber >/dev/null
          unzip -oq sim-data-files.zip -d "${{ github.workspace }}/plots/kalman_ou_iii"
          sudo apt-get update -qq >/dev/null
          sudo apt-get install -y -qq g++ make libeigen3-dev >/dev/null
          cd tests/kalman_ou_iii
          make build >/tmp/ou3-sync-build.log 2>&1
          cp "${{ github.workspace }}"/plots/kalman_ou_iii/*.csv .
          set +e
          bash ./run_tests.sh >/tmp/ou3-sync-test.log 2>&1
          status=$?
          set -e
          {
            echo '### OU-III posterior-marginal synchronization diagnostic'
            echo
            echo 'The patch changes only OU-III production code on temporary PR #193. PR #188 tests, thresholds, simulation sources, data, and workflow remain unchanged.'
            echo
            echo "Complete unchanged OU-III gate exit code: \`$status\`"
            echo
            echo '```text'
            grep -E 'Processing|XYZ RMS \(%Hs\)|Angles RMS|Bias error RMS \(% of max TRUE bias\) \(acc\)|tau_applied|^ERROR:' /tmp/ou3-sync-test.log || true
            echo '```'
          } >/tmp/ou3-sync-comment.md
          gh pr comment 188 --repo bareboat-necessities/ocean-imu --body-file /tmp/ou3-sync-comment.md
          exit "$status"
