name: PR2 final validation

on:
  push:
    branches: [agent/pr2-ou-core-covariance-semantics]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event_name == 'push' || github.head_ref == 'agent/pr2-ou-core-covariance-semantics'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout immutable clean PR2 snapshot
        uses: actions/checkout@v6
        with:
          ref: 5423d6357fca7ca7a4419bd72257f778bf43aebd
          fetch-depth: 0

      - name: Apply proven OU-II covariance synchronization
        shell: bash
        run: |
          set -euo pipefail
          echo '' | base64 -d > /tmp/apply_pr2_fix.py
          python3 /tmp/apply_pr2_fix.py

          git diff --check
          git fetch origin main --depth=1
          git diff --exit-code origin/main -- \
            tests/kalman_ou_ii/run_tests.sh \
            tests/kalman_ou_iii/run_tests.sh

          actual="$(git diff --name-only | sort)"
          expected="$(printf '%s\n' \
            src/kalman_ou_ii/Kalman3D_Wave_OU_II.h \
            src/kalman_ou_ii/SeaStateFusionFilter_OU_II.h | sort)"
          test "$actual" = "$expected"

      - name: Download unchanged-gate simulation data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release download v1.1.3 \
            --repo bareboat-necessities/oceanography-waves-lib \
            --pattern 'sim-data-files.zip' \
            --clobber
          unzip -o sim-data-files.zip -d "${{ github.workspace }}/plots/kalman_ou_ii"
          unzip -o sim-data-files.zip -d "${{ github.workspace }}/plots/kalman_ou_iii"

      - name: Install focused validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make libeigen3-dev

      - name: Run unchanged OU-II quality gate
        shell: bash
        run: |
          set -euo pipefail
          cd tests/kalman_ou_ii
          make build
          cp "${{ github.workspace }}"/plots/kalman_ou_ii/*.csv .
          bash ./run_tests.sh

      - name: Run unchanged OU-III quality gate
        shell: bash
        run: |
          set -euo pipefail
          cd tests/kalman_ou_iii
          make build
          cp "${{ github.workspace }}"/plots/kalman_ou_iii/*.csv .
          bash ./run_tests.sh

      - name: Publish one clean PR2 commit
        shell: bash
        run: |
          set -euo pipefail
          git clean -fdx
          git diff --check
          git fetch origin main --depth=1
          git config user.name 'OpenAI'
          git config user.email 'noreply@openai.com'
          git reset --soft origin/main
          git add -A

          actual="$(git diff --cached --name-only | sort)"
          expected="$(printf '%s\n' \
            src/kalman_common/SeaStateFusionFilterCommon.h \
            src/kalman_ou_common/KalmanOUCoreMath.h \
            src/kalman_ou_ii/Kalman3D_Wave_OU_II.h \
            src/kalman_ou_ii/SeaStateFusionFilter_OU_II.h \
            src/kalman_ou_iii/Kalman3D_Wave_OU_III.h \
            src/kalman_ou_iii/SeaStateFusionFilter_OU_III.h \
            tests/kalman_ou_iii/kalman_ou_common-test.cpp | sort)"
          test "$actual" = "$expected"

          git commit -m 'Fix OU covariance semantics and sample-rate invariance'
          git push origin HEAD:agent/pr2-finalized-clean
