name: apply-wave-direction-frame-patch

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' && github.head_ref == 'agent/apparent-wave-propagation-direction' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v6
        with:
          ref: agent/apparent-wave-propagation-direction
          fetch-depth: 0

      - name: Apply leveled heading-frame changes
        run: python3 tools/apply_wave_direction_frame_patch.py

      - name: Keep temporary workflow out of generated source commit
        run: rm -f tools/apply_wave_direction_frame_patch.py

      - name: Commit source and tests
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git reset .github/workflows/apply-wave-direction-frame-patch.yml
          git commit -m "Use leveled boat-heading frame for wave direction [skip ci]"
          git push origin HEAD:agent/apparent-wave-propagation-direction
