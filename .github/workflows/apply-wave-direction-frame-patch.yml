name: apply-wave-direction-frame-patch

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' && github.head_ref == 'agent/apparent-wave-propagation-direction' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v6
        with:
          ref: agent/apparent-wave-propagation-direction
          fetch-depth: 1
          show-progress: false

      - name: Apply leveled heading-frame changes
        run: python3 tools/apply_wave_direction_frame_patch.py

      - name: Commit source and tests only
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            src/wave_dir/WaveDirectionFrame.h \
            src/kalman_ou_ii/SeaStateFusionFilter_OU_II.h \
            src/kalman_ou_iii/SeaStateFusionFilter_OU_III.h \
            tests/wave_dir/wave-direction-test.cpp
          git diff --cached --check
          git commit -m "Use leveled boat-heading frame for wave direction [skip ci]"
          git push origin HEAD:refs/heads/agent/apparent-wave-propagation-direction
