name: Diagnose OU common compile

on:
  push:
    branches:
      - agent/refactor-ou-shared-core-math

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  compile:
    if: github.event.head_commit.message == 'Diagnose OU common compile'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install compiler dependencies
        run: |
          sudo apt-get update >/dev/null
          sudo apt-get install -y g++ make libeigen3-dev >/dev/null

      - name: Compile and report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          cd tests/kalman_ou_iii
          make clean >/dev/null 2>&1
          make kalman_ou_common-test > /tmp/ou-common-build.log 2>&1
          rc=$?
          {
            echo '### OU common compile diagnostic'
            echo
            echo '```text'
            tail -n 160 /tmp/ou-common-build.log
            echo '```'
          } > /tmp/ou-common-comment.md
          gh pr comment 186 --body-file /tmp/ou-common-comment.md
          exit "$rc"
