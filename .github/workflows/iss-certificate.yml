name: iss-certificate

on:
  push:
    paths:
      - 'src/kalman_ou_iii/**'
      - 'tools/iss_certificate/**'
      - 'doc/kalman_ou_iii/**'
      - '.github/workflows/iss-certificate.yml'
  pull_request:
    paths:
      - 'src/kalman_ou_iii/**'
      - 'tools/iss_certificate/**'
      - 'doc/kalman_ou_iii/**'
      - '.github/workflows/iss-certificate.yml'
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install compiler and solver dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ libeigen3-dev python3-pip
          python3 -m pip install --break-system-packages --disable-pip-version-check \
            numpy==2.3.1 cvxpy==1.7.1 clarabel==0.11.1

      - name: Compile implementation Jacobian generator
        run: |
          mkdir -p build/iss_certificate reports/results
          g++ -O2 -std=c++20 -Wall -Wextra -Werror \
            -DEIGEN_NON_ARDUINO \
            -I src -isystem /usr/include/eigen3 \
            tools/iss_certificate/generate_jacobians.cpp \
            -o build/iss_certificate/generate_jacobians

      - name: Generate Jacobians from OU-III implementation
        run: |
          build/iss_certificate/generate_jacobians \
            reports/results/iss_jacobians.txt

      - name: Solve and independently verify common quadratic witness
        run: |
          python3 tools/iss_certificate/verify_certificate.py \
            reports/results/iss_jacobians.txt \
            --json reports/results/iss_certificate.json \
            --tex reports/results/w3d-iss-certificate-generated.tex-part

      - name: Show certificate summary
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          p = Path('reports/results/iss_certificate.json')
          d = json.loads(p.read_text())
          print(json.dumps({
              'scope': d['scope'],
              'matrices': d['matrix_count'],
              'rho_verified': d['rho_verified'],
              'margin': d['margin'],
              'condition': d['p_condition'],
              'worst_point': d['worst_point'],
          }, indent=2))
          PY

      - name: Upload certificate artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: iss-certificate
          path: |
            reports/results/iss_certificate.json
            reports/results/w3d-iss-certificate-generated.tex-part
            reports/results/iss_jacobians.txt
          if-no-files-found: warn
