name: iss-certificate

on:
  push:
    paths:
      - 'src/kalman_ou_iii/**'
      - 'tools/iss_certificate/**'
      - 'doc/kalman_ou_iii/**'
      - '.github/workflows/iss-certificate.yml'
  pull_request:
    paths:
      - 'src/kalman_ou_iii/**'
      - 'tools/iss_certificate/**'
      - 'doc/kalman_ou_iii/**'
      - '.github/workflows/iss-certificate.yml'
  workflow_dispatch:

concurrency:
  group: iss-certificate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install compiler and verification dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ libeigen3-dev python3-pip
          python3 -m pip install --break-system-packages --disable-pip-version-check \
            numpy==2.3.1 scipy==1.16.0

      - name: Compile implementation Jacobian generator
        run: |
          mkdir -p build/iss_certificate reports/results
          g++ -O2 -std=c++20 -Wall -Wextra -Werror \
            -DEIGEN_NON_ARDUINO \
            -I src -isystem /usr/include/eigen3 \
            tools/iss_certificate/generate_jacobians.cpp \
            -o build/iss_certificate/generate_jacobians

      - name: Generate Jacobians from OU-III implementation
        run: |
          build/iss_certificate/generate_jacobians \
            reports/results/iss_jacobians.txt

      - name: Verify reduced performance-state stability
        run: |
          python3 tools/iss_certificate/verify_certificate.py \
            reports/results/iss_jacobians.txt \
            --json reports/results/iss_certificate.json \
            --tex reports/results/w3d-iss-certificate-generated.tex-part

      - name: Show certificate summary
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          d = json.loads(Path('reports/results/iss_certificate.json').read_text())
          print(json.dumps({
              'scope': d['scope'],
              'certificate_type': d['certificate_type'],
              'matrices': d['matrix_count'],
              'performance_state_dimension': d['state_dimension'],
              'spectral_radius_max': d['spectral_radius_max'],
              'spectral_margin_min': d['spectral_margin_min'],
              'rho_metric_max': d['rho_metric_max'],
              'max_bias_coupling_2norm': d['max_bias_coupling_2norm'],
              'worst_spectral_point': d['worst_spectral_point'],
          }, indent=2))
          PY

      - name: Upload certificate artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: iss-certificate
          path: |
            reports/results/iss_certificate.json
            reports/results/w3d-iss-certificate-generated.tex-part
            reports/results/iss_jacobians.txt
          if-no-files-found: warn
